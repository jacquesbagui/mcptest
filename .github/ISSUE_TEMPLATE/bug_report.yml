name: Bug report
description: Something doesn't work the way it should
labels: [bug]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "packages/core (Python)"
        - "packages/sdk-node (TypeScript)"
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mcptest version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include a minimal contract, command, or code snippet that reproduces the issue.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Node version, MCP server under test (stdio/http/sse).
