name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readme-sync:
    name: README sync (root ↔ core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify packages/core/README.md matches README.md
        run: |
          if ! diff -q README.md packages/core/README.md >/dev/null; then
            echo "::error::packages/core/README.md is out of sync with README.md."
            echo "Run: cp README.md packages/core/README.md"
            diff README.md packages/core/README.md | head -60
            exit 1
          fi

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "packages/core/pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Ruff
        run: .venv/bin/ruff check src tests

      - name: Mypy
        run: .venv/bin/mypy src

      - name: Pytest (with coverage)
        run: .venv/bin/pytest --cov=mcpact --cov-report=xml --cov-report=term -q

      - name: Upload coverage artefact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python
          path: packages/core/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  node:
    name: Node.js (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for toy MCP server used in e2e tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "packages/core/pyproject.toml"

      - name: Install Python core (provides toy_server.py + mcp deps)
        working-directory: packages/core
        run: |
          uv venv
          uv pip install -e "."

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests (with coverage)
        run: pnpm test:coverage

      - name: Upload coverage artefact
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-node
          path: packages/sdk-node/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm build
