name: Publish (npm)

on:
  push:
    tags:
      - "sdk-v*"

jobs:
  build-and-publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/mcpact
    permissions:
      contents: read
      id-token: write  # required for npm provenance
    defaults:
      run:
        working-directory: packages/sdk-node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Python (for toy MCP server used in e2e tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "packages/core/pyproject.toml"

      - name: Install Python core
        working-directory: packages/core
        run: |
          uv venv
          uv pip install -e "."

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#sdk-v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG"

      - name: Typecheck + tests
        run: |
          pnpm typecheck
          pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm (with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
